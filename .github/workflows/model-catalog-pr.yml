name: Add model catalog entry

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: model-catalog-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  qualify_model_request:
    name: Qualify model catalog request
    permissions: {}
    runs-on: ubuntu-latest
    outputs:
      accepted: ${{ steps.qualify.outputs.accepted }}

    steps:
      - name: Check request shape and current repository permission
        id: qualify
        env:
          GH_TOKEN: ${{ secrets.MODEL_CATALOG_PR_TOKEN || github.token }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node --input-type=module <<'NODE'
          import { execFileSync } from "node:child_process";
          import { appendFileSync } from "node:fs";

          const trustedPermissions = new Set(["admin", "maintain", "write"]);
          const body = process.env.ISSUE_BODY ?? "";
          const hasRequestFields = body.includes("### Provider") && body.includes("### Model ID");
          let permission = "";

          try {
            permission = execFileSync(
              "gh",
              [
                "api",
                `repos/${process.env.GITHUB_REPOSITORY}/collaborators/${process.env.ISSUE_AUTHOR}/permission`,
                "--jq",
                ".permission",
              ],
              { encoding: "utf8", stdio: ["ignore", "pipe", "ignore"] },
            ).trim();
          } catch {
            permission = "";
          }

          const accepted = trustedPermissions.has(permission) && hasRequestFields;

          appendFileSync(process.env.GITHUB_OUTPUT, `accepted=${accepted}\n`);
          appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            `Model catalog request: ${accepted ? "accepted" : "ignored"}. Repository permission: ${permission || "none"}.\n`,
          );
          NODE

  create-model-pr:
    name: Create model catalog pull request
    needs: qualify_model_request
    if: needs.qualify_model_request.outputs.accepted == 'true'
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: automation/model-catalog-issue-${{ github.event.issue.number }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      GH_TOKEN: ${{ secrets.MODEL_CATALOG_PR_TOKEN || github.token }}
      ISSUE_BODY_PATH: ${{ github.workspace }}/.model-catalog-issue.md
      RESULT_PATH: ${{ github.workspace }}/.model-catalog-result.json
      PULL_REQUEST_BODY_PATH: ${{ github.workspace }}/.model-catalog-pull-request.md

    steps:
      - name: Check out the default branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ secrets.MODEL_CATALOG_PR_TOKEN || github.token }}

      - name: Load the issue body without shell interpolation
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}" --jq '.body // ""' > "$ISSUE_BODY_PATH"

      - name: Validate the request and update the catalog
        id: update
        run: |
          node .github/scripts/update-model-catalog.mjs \
            --catalog src/providers/models.json \
            --issue-body "$ISSUE_BODY_PATH" \
            --result "$RESULT_PATH" \
            --pull-request-body "$PULL_REQUEST_BODY_PATH" \
            --issue-number "$ISSUE_NUMBER" \
            --github-output "$GITHUB_OUTPUT"

      - name: Explain an invalid request
        if: steps.update.outputs.status == 'invalid'
        env:
          RESULT_MESSAGE: ${{ steps.update.outputs.message }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "Model catalog request rejected: ${RESULT_MESSAGE}. Edit the request and open a new issue."

      - name: Fail an invalid request
        if: steps.update.outputs.status == 'invalid'
        run: exit 1

      - name: Explain a duplicate request
        if: steps.update.outputs.status == 'duplicate'
        env:
          RESULT_MESSAGE: ${{ steps.update.outputs.message }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "${RESULT_MESSAGE}. No pull request was created."

      - name: Commit the catalog update
        if: steps.update.outputs.status == 'added'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH_NAME"
          git add -- src/providers/models.json
          git diff --cached --exit-code && {
            echo "The updater reported a change but models.json is unchanged." >&2
            exit 1
          }
          git commit -m "Add model catalog entry from issue #${ISSUE_NUMBER}"
          git fetch origin "$BRANCH_NAME:refs/remotes/origin/$BRANCH_NAME" || true
          git push --force-with-lease origin "HEAD:refs/heads/$BRANCH_NAME"

      - name: Create the pull request
        if: steps.update.outputs.status == 'added'
        id: pull-request
        env:
          PROVIDER: ${{ steps.update.outputs.provider }}
        run: |
          pull_request_url=$(gh pr list --head "$BRANCH_NAME" --state open --json url --jq '.[0].url // empty')
          if [ -z "$pull_request_url" ]; then
            pull_request_url=$(gh pr create \
              --base "$DEFAULT_BRANCH" \
              --head "$BRANCH_NAME" \
              --title "Add ${PROVIDER} model from issue #${ISSUE_NUMBER}" \
              --body-file "$PULL_REQUEST_BODY_PATH")
          fi
          echo "url=${pull_request_url}" >> "$GITHUB_OUTPUT"

      - name: Link the pull request from the issue
        if: steps.update.outputs.status == 'added'
        env:
          PULL_REQUEST_URL: ${{ steps.pull-request.outputs.url }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "Opened ${PULL_REQUEST_URL} for manual review."
